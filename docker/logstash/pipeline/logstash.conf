# ============================================================================
# AirVLC — Logstash Pipeline: CSV Calidad del Aire → Elasticsearch
# ============================================================================
# Ingesta el archivo CSV de calidad del aire de València y lo indexa
# en Elasticsearch para su visualización en Kibana.
#
# El CSV usa separador ';' y tiene encoding UTF-8 con BOM.
# ============================================================================

input {
  file {
    path => "/usr/share/logstash/csv-data/calidad-aire-2016.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain { charset => "UTF-8" }
  }
}

filter {
  # ── 1. Parsear CSV ──────────────────────────────────────────────────────────
  csv {
    separator => ";"
    columns => [
      "fecha", "dia_semana", "dia_mes", "hora", "estacion",
      "pm1", "pm25", "pm10", "no", "no2", "nox", "o3", "so2", "co",
      "velocidad_viento", "direccion_viento", "nh3", "c7h8", "c6h6",
      "ruido", "c8h10", "temperatura", "humedad_relativa",
      "presion", "radiacion", "precipitacion", "velocidad_max_viento"
    ]
    skip_header => true
  }

  # ── 2. Eliminar BOM si existe ──────────────────────────────────────────────
  mutate {
    gsub => ["fecha", "\xEF\xBB\xBF", ""]
  }

  # ── 3. Parsear fecha ISO 8601 como @timestamp ──────────────────────────────
  date {
    match => ["fecha", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss"]
    target => "@timestamp"
    timezone => "Europe/Madrid"
  }

  # ── 4. Convertir campos numéricos ──────────────────────────────────────────
  mutate {
    convert => {
      "dia_mes" => "integer"
      "pm1" => "float"
      "pm25" => "float"
      "pm10" => "float"
      "no" => "float"
      "no2" => "float"
      "nox" => "float"
      "o3" => "float"
      "so2" => "float"
      "co" => "float"
      "velocidad_viento" => "float"
      "direccion_viento" => "float"
      "nh3" => "float"
      "c7h8" => "float"
      "c6h6" => "float"
      "ruido" => "float"
      "c8h10" => "float"
      "temperatura" => "float"
      "humedad_relativa" => "float"
      "presion" => "float"
      "radiacion" => "float"
      "precipitacion" => "float"
      "velocidad_max_viento" => "float"
    }
  }

  # ── 5. Añadir coordenadas geográficas por estación ─────────────────────────
  # Mapeo basado en el GeoJSON de estaciones
  if [estacion] == "Avda. Francia" {
    mutate { add_field => { "[location][lat]" => "39.4578" "[location][lon]" => "-0.3430" } }
  } else if [estacion] == "Bulevard Sud" {
    mutate { add_field => { "[location][lat]" => "39.4504" "[location][lon]" => "-0.3963" } }
  } else if [estacion] == "Molí del Sol" {
    mutate { add_field => { "[location][lat]" => "39.4811" "[location][lon]" => "-0.4088" } }
  } else if [estacion] == "Pista Silla" {
    mutate { add_field => { "[location][lat]" => "39.4581" "[location][lon]" => "-0.3766" } }
  } else if [estacion] == "Politécnico" {
    mutate { add_field => { "[location][lat]" => "39.4796" "[location][lon]" => "-0.3374" } }
  } else if [estacion] == "Viveros" {
    mutate { add_field => { "[location][lat]" => "39.4796" "[location][lon]" => "-0.3696" } }
  } else if [estacion] == "Valencia Centro" {
    mutate { add_field => { "[location][lat]" => "39.4705" "[location][lon]" => "-0.3764" } }
  }

  # Convertir coordenadas a float si existen
  if [location][lat] {
    mutate {
      convert => {
        "[location][lat]" => "float"
        "[location][lon]" => "float"
      }
    }
  }

  # ── 6. Limpiar campos de metadatos de Logstash ─────────────────────────────
  mutate {
    remove_field => ["message", "host", "path", "log", "event", "@version"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "airvlc-calidad-aire"
    # Template para el mapping del índice
    template_name => "airvlc-calidad-aire"
    template_overwrite => true
    template => "/usr/share/logstash/config/es-template.json"
  }

  # Mostrar progreso en stdout (útil para debug)
  stdout {
    codec => dots
  }
}
