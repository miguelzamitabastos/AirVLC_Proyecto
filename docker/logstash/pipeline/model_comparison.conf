# ============================================================================
# AirVLC — Logstash Pipeline: Comparativa de modelos v1 vs v2 → Elasticsearch
# ============================================================================
# Lee `data/processed/model_comparison_v1_v2.csv` (generado por
# `src/scripts/build_model_comparison_csv.py`) e indexa una fila por
# (versión, arquitectura, target) en `airvlc-model-comparison-v1v2`.
#
# El CSV está en formato long: una métrica (mae/rmse/r2) por fila —
# eso permite a Kibana hacer breakdowns naturales por target/arch.
# ============================================================================

input {
  file {
    path => "/usr/share/logstash/csv-processed/model_comparison_v1_v2.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain { charset => "UTF-8" }
  }
}

filter {
  csv {
    separator => ","
    columns => [
      "timestamp", "version", "architecture", "family", "target",
      "mae", "rmse", "r2", "n_params", "training_time_sec",
      "best_epoch", "is_winner"
    ]
    skip_header => true
  }

  # Skip filas vacías o cabeceras duplicadas que pudieran colarse
  if [version] !~ "^v[12]$" {
    drop { }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
    timezone => "Europe/Madrid"
  }

  mutate {
    convert => {
      "mae"               => "float"
      "rmse"              => "float"
      "r2"                => "float"
      "n_params"          => "integer"
      "training_time_sec" => "float"
      "best_epoch"        => "integer"
      "is_winner"         => "integer"
    }
  }

  mutate {
    remove_field => ["message", "host", "path", "log", "event", "@version"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "airvlc-model-comparison-v1v2"
    document_id => "%{version}-%{architecture}-%{target}"
    template_name => "airvlc-model-comparison-v1v2"
    template_overwrite => true
    template => "/usr/share/logstash/config/es-template-model-comparison.json"
  }

  stdout {
    codec => dots
  }
}
