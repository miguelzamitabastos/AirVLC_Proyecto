name: Motor de Calidad del Aire (GVA + ML)

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta en el minuto 0 de cada hora
  workflow_dispatch: 

jobs:
  actualizar_predicciones:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌍 1. Ingesta de Datos (GVA -> Mongo)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python -m src.ingestion.gva_rvvcca_csv_client

      - name: 🧠 2. Predicción ML (Mongo -> Mongo)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python -m src.scripts.predict_and_save