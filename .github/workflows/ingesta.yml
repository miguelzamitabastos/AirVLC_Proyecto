---
name: Ingesta Calidad del Aire (GVA + ML)

"on":
  schedule:
    - cron: '0 * * * *'  # Se ejecuta en el minuto 0 de cada hora
  workflow_dispatch:

jobs:
  actualizar_predicciones:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pymongo[srv]"

      # Paso 1: 6 estaciones canónicas vía GVA RVVCCA + Puerto Valencia vía WAQI
      # (supplement_missing_canonical_from_waqi dentro de gva_rvvcca_csv_client).
      # Requiere secrets: MONGO_URI y WAQI_TOKEN.
      - name: 🌍 1. Ingesta de Datos (GVA + WAQI fallback -> Mongo)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: python -m src.ingestion.gva_rvvcca_csv_client

      # Paso 2: predicciones; inject_latest_from_mongo usa el doc WAQI de Puerto Valencia.
      - name: 🧠 2. Predicción ML (Mongo -> Mongo)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: python -m src.scripts.predict_and_save
