---
name: Lint & Code Quality

"on":
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/lint.yml'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar herramientas de linting
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort

      - name: ✅ Verificar formato con black
        run: black --check src/ tests/ || true  # no fail, solo warn

      - name: 🔤 Verificar imports con isort
        run: isort --check-only src/ tests/ || true  # no fail, solo warn

      - name: 🔍 Analizar con ruff (reglas PEP8 + more)
        run: |
          ruff check src/ tests/ \
            --select=E,W,F,I \
            --ignore=E501,W503 \
            --max-line-length=120
        continue-on-error: true  # warnings, no blockers

      - name: 📋 Reporte de complejidad (opcional)
        run: |
          pip install radon
          radon cc src/ -a -s || true  # solo info

  security:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔐 Escanear dependencias (bandit)
        run: |
          pip install bandit
          bandit -r src/ -ll || true  # solo warnings altos

      - name: 🔐 Chequear dependencias inseguras (safety)
        run: |
          pip install safety
          pip install -r requirements.txt
          safety check || true  # solo info
